workflows:
  android-workflow:
    name: Build Android APK
    max_build_duration: 30
    instance_type: linux
    scripts:
      - name: Set up Flutter project
        script: |
          flutter create .
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
